nodeClases:
  classes:
    addonsclass:
        blockDeviceMappings:
          - deviceName: /dev/xvda
            ebs:
              volumeSize: 25Gi
              volumeType: gp3
              iops: 3000
              encrypted: true
              deleteOnTermination: true
              throughput: 125
        metadataOptions:
          httpPutResponseHopLimit: 2  
# Node Pools Values
nodePools:
    addonspool:
      nodeClassName: addonsclass
      labels: 
        billing-team: platform-team
        node-role/addons: "true"
        CriticalAddonsOnly: "true"
      annotations:
        example.com/owner: platform-team
      taints:
        - key: CriticalAddonsOnly
          effect: NoSchedule
      requirements:
        - key: "karpenter.k8s.aws/instance-category"
          operator: In
          values: ["c", "m", "r"]
        - key: "karpenter.k8s.aws/instance-cpu"
          operator: In
          values: ["4", "8", "16", "32"]
        - key: "karpenter.k8s.aws/instance-hypervisor"
          operator: In
          values: ["nitro"]
        - key: "karpenter.k8s.aws/instance-generation"
          operator: Gt
          values: ["2"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot","on-demand"] 
      limits:
        cpu: 1000
        memory: 1000Gi