################################################################################
# This file is used to populate the values of fleet-hub-external-secets-appset.yaml
################################################################################

################################################################################
# Cluster Related values
################################################################################
tenant: "workload2" # Tenancy membership that will help us define the folder structure
environment: "workload2"
clusterName: "spoke-workload2"
# The values of the addons_repo_basepath and resources_repo_basepath define the static folder structure for example addons/tennants but we dont include the name of tenant since its dynamic
# For example control-plane or workload1
addons_repo_basepath: "addons/tenants"
resources_repo_basepath: "resources/tenants"
secretManagerSecretName: "civreg-hub-cluster/spoke-workload2" # Name of secret that we get information about the cluster
# Example how we can overwirte a repo if we want in the fleet configuration to see another repo
