apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-addons-v2
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - matrix:
      generators:
        - matrix:
            generators:
              - clusters:
                  selector:
                    matchLabels:
                      fleet_member: hub-cluster
                  values:
                    addonChart: application-sets
                    addonChartRepository: "471112582304.dkr.ecr.eu-west-2.amazonaws.com"                 
                    addonChartPath: "charts/application-sets"
                    applicationSetGroup: "addons"
                    use_helm_repo_path: "false"
              - git:
                  repoURL: '{{ .metadata.annotations.fleet_repo_url }}'
                  revision: '{{ .metadata.annotations.fleet_repo_revision }}'
                  files:
                    - path: "{{ .metadata.annotations.fleet_repo_basepath }}/bootstrap/versions/applicationSets.yaml"
        - list:
            elementsYaml: |
              {{- $elements := list }}
              {{- /* Always add default version as it must exist */ -}}
              {{- $elements = append $elements (dict "versionType" "default" "version" .default "suffix" "") }}
              
              {{- /* Add environment version if it exists */ -}}
              {{- if hasKey .environments .metadata.labels.environment }}
              {{- $elements = append $elements (dict "versionType" "env" "version" (index .environments .metadata.labels.environment) "suffix" (printf "-%s" .metadata.labels.environment)) }}
              {{- end }}
              
              {{- /* Add tenant-env version if it exists */ -}}
              {{- if hasKey .tenants .metadata.labels.tenant }}
              {{- $tenant := index .tenants .metadata.labels.tenant }}
              {{- if hasKey $tenant "environments" }}
              {{- if hasKey $tenant.environments .metadata.labels.environment }}
              {{- $elements = append $elements (dict "versionType" "tenant-env" "version" (index $tenant.environments .metadata.labels.environment) "suffix" (printf "-%s-%s" .metadata.labels.tenant .metadata.labels.environment)) }}
              {{- end }}
              {{- end }}
              {{- end }}
              
              elements: {{ $elements | toJson }}
  ###################################################
  #base template (everything common)
  ###################################################
  template:
    metadata:
      name: 'cluster-{{.values.applicationSetGroup}}{{.suffix}}-{{.version | replace "." "-" | trim }}'
    spec:
      project: default
      destination:
        namespace: argocd
        name: '{{ .name }}'
      # syncPolicy is identical for both variants
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
  ###################################################
  # conditional sources
  ###################################################
  templatePatch: |
    spec:
      sources:
        - ref: values
          repoURL: '{{ .metadata.annotations.addons_repo_url }}'
          targetRevision: '{{ .metadata.annotations.addons_repo_revision }}'
       {{- if  eq .values.use_helm_repo_path "false" }}
        - repoURL: '{{ .values.addonChartRepository }}'
          chart: '{{ .values.addonChart }}'
          targetRevision: '{{.targetRevision}}'
      {{- else }}
        - repoURL: '{{ .metadata.annotations.addons_repo_url }}'
          path: '{{ .values.addonChartPath }}'
          targetRevision: '{{ .metadata.annotations.addons_repo_revision }}'
      {{- end }}
          helm:
            ignoreMissingValueFiles: true
            valuesObject:
              valueFiles:
                - default/{{.values.applicationSetGroup}}
                - clusters/{{ .nameNormalized }}/{{.values.applicationSetGroup}}
            valueFiles:
              - $values/{{ .metadata.annotations.addons_repo_basepath }}/bootstrap/default/{{.values.applicationSetGroup}}.yaml
              - $values/{{ .metadata.annotations.addons_repo_basepath }}/{{ .metadata.labels.tenant }}/default/{{ .values.addonChart }}/{{.values.applicationSetGroup}}.yaml
              - $values/{{ .metadata.annotations.addons_repo_basepath }}/{{ .metadata.labels.tenant }}/clusters/{{ .name }}/{{ .values.addonChart }}/{{.values.applicationSetGroup}}.yaml
              - $values/{{ .metadata.annotations.addons_repo_basepath }}/{{ .metadata.labels.tenant }}/environments/{{ .metadata.labels.environment }}/{{ .values.addonChart }}/{{.values.applicationSetGroup}}.yaml