apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-versioned
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - matrix:
      generators:
        - clusters:
            selector:
              matchLabels:
                fleet_member: hub-cluster
            values:
              addonChart: application-sets
              addonChartRepository: "471112582304.dkr.ecr.eu-west-2.amazonaws.com"
              tenant: '{{.metadata.labels.tenant}}'
              environment: '{{.metadata.labels.environment}}'
        - git:
            repoURL: '{{.metadata.annotations.fleet_repo_url}}'
            revision: '{{.metadata.annotations.fleet_repo_revision}}'
            files:
              - path: '{{.metadata.annotations.fleet_repo_basepath}}/bootstrap/versions/*.yaml'
  template:
    metadata:
      name: cluster-versioned
    spec:
      project: default
      sources:
      - ref: values
        repoURL: '{{.metadata.annotations.addons_repo_url}}'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
      - chart: 'application-sets'
        repoURL: '471112582304.dkr.ecr.eu-west-2.amazonaws.com'
        targetRevision: '{{.default}}'
        helm:
          ignoreMissingValueFiles: true
          valuesObject:
            valueFiles:
              - default/addons
              - clusters/{{.nameNormalized}}/addons
            mergeValues:
              addons: 
                use: true
              ack:
                use: true
          valueFiles:
            - $values/{{.metadata.annotations.addons_repo_basepath}}/bootstrap/default/addons.yaml
            - $values/{{.metadata.annotations.addons_repo_basepath}}/{{ .metadata.labels.tenant }}/default/{{ .values.addonChart }}/addons.yaml
            - $values/{{.metadata.annotations.addons_repo_basepath}}/{{ .metadata.labels.tenant }}/clusters/{{ .name }}/{{.values.addonChart}}/addons.yaml
            - $values/{{.metadata.annotations.addons_repo_basepath}}/{{ .metadata.labels.tenant }}/environments/{{ .metadata.labels.environment }}/{{ .values.addonChart }}/addons.yaml
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true  # Big CRDs.