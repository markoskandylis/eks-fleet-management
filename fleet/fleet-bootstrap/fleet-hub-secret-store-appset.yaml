apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-hub-secret-store
  namespace: argocd
spec:
  goTemplate: true
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: hub-cluster
      values:
        addonChart: fleet-secret
  template:
    metadata:
      name: 'fleet-hub-secret-store-{{.nameNormalized}}'
    spec:
      project: default
      source:
        repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        path: 'charts/{{.values.addonChart}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        helm:
          releaseName: '{{.nameNormalized}}'
          ignoreMissingValueFiles: true
          valuesObject:
            secretStore:
              enabled: true
              name: "fleet-eks-secret-store"
              kind: "SecretStore"
              region: '{{.metadata.annotations.aws_region}}'
            external_secrets:
              enabled: '{{default .metadata.annotations.enable_hub_external_secrets false}}'
              server: "self"
              creationPolicy: Merge
              secretStoreRefName: fleet-eks-secret-store
              secretStoreRefKind: SecretStore
              secretManagerSecretName: '{{.metadata.annotations.hub_secret_name}}'
          valueFiles:
            - $addonsValues/{{.metadata.annotations.addons_repo_basepath}}/{{.metadata.annotations.tenant}}/fleet/{{.values.addonChart}}/values.yaml
      destination:
        name: '{{.name}}'
        namespace: "argocd"
      syncPolicy:
        automated:
          allowEmpty: true
        retry:
          backoff:
            duration: 1m
          limit: 100
        syncOptions:
          - CreateNamespace=true

