apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-hub-secret-store
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - matrix:
      generators:
        - clusters:
            selector:
              matchLabels:
                fleet_member: hub-cluster
            values:
              addonChart: fleet-secret
              addonChartRepository: "471112582304.dkr.ecr.eu-west-2.amazonaws.com"                 
              addonChartPath: "charts/fleet-secret"
        - git:
            repoURL: '{{ .metadata.annotations.fleet_repo_url }}'
            revision: '{{ .metadata.annotations.fleet_repo_revision }}'
            files:
              - path: "{{ .metadata.annotations.fleet_repo_basepath }}/bootstrap/versions/fleetSecrets.yaml"
  ###################################################
  #base template (everything common)
  ###################################################
  template:
    metadata:
      name: 'fleet-hub-secret-store-{{.nameNormalized}}'
    spec:
      project: default
      destination:
        namespace: argocd
        name: '{{ .name }}'
      # syncPolicy is identical for both variants
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
  ###################################################
  # conditional sources
  ###################################################
  templatePatch: |
    spec:
      source:
       {{- if  eq .metadata.labels.use_helm_repo_path "false" }}
        repoURL: '{{ .values.addonChartRepository }}'
        chart: '{{ .values.addonChart }}'
        targetRevision: '{{ with . }}
          {{- $default := .default }}
          {{- $envDefault := "" }}
          {{- $tenantEnvVersion := "" }}
          {{- $tenantClusterVersion := "" }}
          {{- if hasKey . "environments" }}
            {{- $envDefault = index .environments .metadata.labels.environment | default "" }}
          {{- end }}
          {{- if hasKey . "tenants" }}
            {{- $tenant := index .tenants .metadata.labels.tenant | default dict }}
            {{- if hasKey $tenant "environments" }}
              {{- $tenantEnvVersion = index $tenant.environments .metadata.labels.environment | default "" }}
            {{- end }}
            {{- if hasKey $tenant "clusters" }}
              {{- $tenantClusterVersion = index $tenant.clusters .name | default "" }}
            {{- end }}
          {{- end }}
          {{- coalesce $tenantClusterVersion $tenantEnvVersion $envDefault $default }}
        {{- end }}'
      {{- else }}
        repoURL: '{{ .metadata.annotations.fleet_repo_url }}'
        path: '{{ .values.addonChartPath }}'
        targetRevision: '{{ .metadata.annotations.fleet_repo_revision }}'
      {{- end }}
        helm:
          releaseName: '{{.nameNormalized}}'
          ignoreMissingValueFiles: true
          valuesObject:
            secretStore:
              enabled: true
              name: "fleet-eks-secret-store"
              kind: "SecretStore"
              region: '{{.metadata.annotations.aws_region}}'
            external_secret:
              enabled: '{{default .metadata.annotations.enable_hub_external_secrets false}}'
              server: "self"
              creationPolicy: Merge
              secretStoreRefName: fleet-eks-secret-store
              secretStoreRefKind: SecretStore
              secretManagerSecretName: '{{.metadata.annotations.hub_secret_name}}'
          valueFiles:
            - $addonsValues/{{.metadata.annotations.addons_repo_basepath}}/{{.metadata.annotations.tenant}}/fleet/{{.values.addonChart}}/values.yaml