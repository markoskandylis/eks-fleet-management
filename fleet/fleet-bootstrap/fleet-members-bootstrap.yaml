# Push doenst use that in general
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-member-bootstrap
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - matrix:
      generators:
        - matrix:
            generators:
              - clusters:
                  selector:
                    matchLabels:
                      fleet_member: hub-cluster
                  values:
                    addonChart: application-sets
                    fleet_memeber: hub-cluster            
                    addonChartPath: "charts/application-sets"
                    applicationSetGroup: "fleet"
                    groupRelease: '{{default "" (index .metadata.labels "fleetRelease")}}'
                    useSelectors: "false"
              - git:
                  repoURL: '{{ .metadata.annotations.fleet_repo_url }}'
                  revision: '{{ .metadata.annotations.fleet_repo_revision }}'
                  files:
                    - path: "{{ .metadata.annotations.fleet_repo_basepath }}/bootstrap/versions/applicationSets.yaml"
        - list:
            elementsYaml: |
                  {{- $groupVersions := index .versions .values.applicationSetGroup | toJson | fromJson -}}
                  {{- $result := list -}}
                  {{- $defaultVersion := dict -}}
                  {{- /* Defining the Default Version in case we need to fall back */ -}}
                  {{- range $groupVersion := $groupVersions -}}
                    {{- if eq $groupVersion.type "default" -}}
                      {{- $defaultVersion = $groupVersion -}}
                    {{- end -}}
                  {{- end -}}
                  {{- /* We look for the defined versions */ -}}
                  {{- range $groupVersion := $groupVersions -}}
                    {{- /* Case 1: If selectors is true, include all group versions */ -}}
                    {{- if eq $.values.useSelectors "true" -}}
                      {{- $result = append $result $groupVersion -}}
                    {{- /* Case 2: If group version Release value exists, only include matching versions */ -}}
                    {{- else if $.values.groupRelease -}}
                      {{- if or (not $groupVersion.version) (eq $groupVersion.version $.values.groupRelease) -}}
                        {{- $result = append $result $groupVersion -}}
                      {{- end -}}
                    {{- /* Case 3: Default case - include version if it's the default type */ -}}
                    {{- else -}}
                      {{- if eq $groupVersion.type "default" -}}
                        {{- $result = append $result $groupVersion -}}
                      {{- end -}}
                    {{- end -}}
                  {{- end -}}
                  {{- /* If no versions were selected, use default */ -}}
                  {{- if eq (len $result) 0 -}}
                    {{- $result = append $result $defaultVersion -}}
                  {{- end -}}
                  {{ $result | toJson }}
  ###################################################
  #base template (everything common)
  ###################################################
  template:
    metadata:
      name: 'fleet-member-bootstrap-{{.values.addonChart}}-{{.version | replace "." "-" | trim }}'
    spec:
      project: default
      destination:
        namespace: argocd
        name: '{{ .name }}'
      # syncPolicy is identical for both variants
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
  ###################################################
  # conditional sources
  ###################################################
  templatePatch: |
    spec:
      sources:
        - ref: values
          repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
          path: '{{.metadata.annotations.fleet_repo_basepath}}/fleet-bootstrap/members-init-v2'
          targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
       {{- if  eq .use_helm_repo_path "false" }}
        - repoURL: '{{ .chartRepo }}'
          chart: '{{ default .values.addonChart .ecrChartName  }}'
          targetRevision: '{{.version}}'
      {{- else }}
        - repoURL: '{{ .metadata.annotations.fleet_repo_url }}'
          path: '{{ .values.addonChartPath }}'
          targetRevision: '{{ .metadata.annotations.fleet_repo_revision }}'
      {{- end }}
          helm:
            ignoreMissingValueFiles: true
            valuesObject:
              groupVersion: '{{.version | replace "." "" | trim }}'
              {{- if ne .values.groupRelease ""}}
              releases:
                {{.values.applicationSetGroup}}Release: '{{.version}}'
              {{- end }}
              {{- if eq .values.useSelectors "false"}}
              globalSelectors:
                fleet_member: spoke
                use_remote_argo: "true"
              {{- end }}
            valueFiles:
              - $values/fleet/fleet-bootstrap/members-init-v2/fleet-spoke-bootstrap-values.yaml