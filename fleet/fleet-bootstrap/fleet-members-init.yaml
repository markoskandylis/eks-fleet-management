apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-member-bootstrap
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: hub-cluster
      values:
        addonChart: application-sets
  template:
    metadata:
      name: 'fleet-member-bootstrap'
    spec:
      project: default
      sources:
      - ref: values
        repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        path: '{{.metadata.annotations.fleet_repo_basepath}}/fleet-bootstrap/members-init-v2'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        path: 'charts/{{.values.addonChart}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        helm:
          ignoreMissingValueFiles: true
          valuesObject:
            globalSelectors:
              fleet_member: spoke
              use_remote_argo: "true"             
          valueFiles:
            - $values/fleet-bootstrap/members-init-v2/fleet-spoke-bootstrap-values.yaml
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true  # Big CRDs.