apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-hub-secret-store
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - matrix:
      generators:
        - matrix:
            generators:
              - clusters:
                  selector:
                    matchLabels:
                      fleet_member: hub-cluster
                  values:
                    addonChart: fleet-secret
                    fleet_memeber: hub-cluster
                    addonChartRepository: "471112582304.dkr.ecr.eu-west-2.amazonaws.com"               
                    addonChartPath: "charts/fleet-secret"
                    use_helm_repo_path: "true"
              - git:
                  repoURL: '{{ .metadata.annotations.fleet_repo_url }}'
                  revision: '{{ .metadata.annotations.fleet_repo_revision }}'
                  files:
                    - path: "{{ .metadata.annotations.fleet_repo_basepath }}/bootstrap/versions/fleetSecrets.yaml"
        - list:
            elementsYaml: "{{ .versions | toJson }}"
  ###################################################
  #base template (everything common)
  ###################################################
  template:
    metadata:
      name: 'fleet-hub-secret-store-{{.nameNormalized}}-{{.values.addonChart}}-{{.version | replace "." "-" | trim }}'
    spec:
      project: default
      destination:
        namespace: argocd
        name: '{{ .name }}'
      # syncPolicy is identical for both variants
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
  ###################################################
  # conditional sources
  ###################################################
  templatePatch: |
    spec:
      sources:
       {{- if  eq .values.use_helm_repo_path "false" }}
        - repoURL: '{{ .values.addonChartRepository }}'
          chart: '{{ .values.addonChart }}'
          targetRevision: '{{.version}}'
      {{- else }}
        - repoURL: '{{ .metadata.annotations.fleet_repo_url }}'
          path: '{{ .values.addonChartPath }}'
          targetRevision: '{{ .metadata.annotations.fleet_repo_revision }}'
      {{- end }}
          helm:
            releaseName: '{{.nameNormalized}}-{{.version | replace "." "-" | trim }}'
            ignoreMissingValueFiles: true
            valuesObject:
              secretStore:
                enabled: true
                name: "fleet-eks-secret-store-{{.nameNormalized}}-{{.version | replace "." "-" | trim }}"
                kind: "SecretStore"
                region: '{{.metadata.annotations.aws_region}}'
              external_secret:
                enabled: '{{default .metadata.annotations.enable_hub_external_secrets false}}'
                server: "self"
                creationPolicy: Merge
                secretStoreRefName: fleet-eks-secret-store
                secretStoreRefKind: SecretStore
                secretManagerSecretName: '{{.metadata.annotations.hub_secret_name}}'